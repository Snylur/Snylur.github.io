<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THMA Quiz</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    background: #f4f4f4;
    padding: 20px;
  }

  h1, h2 { text-align: center; }

  .question {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
  }

  input[type="range"] {
    width: 100%;
  }

  .labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #555;
  }

  button {
    display: block;
    margin: 30px auto;
    padding: 12px 25px;
    font-size: 16px;
  }

  #result {
    margin-top: 30px;
    background: white;
    padding: 25px;
    border-radius: 10px;
  }
</style>
</head>
<body>

<h1>THMA Quiz</h1>
<p style="text-align:center;">What is your THMA type?</p>

<form id="quiz"></form>

<button onclick="calculateResult()">Get Result</button>

<div id="result" style="display:none;"></div>

<script>
// TRAITS: complexity, visual, automation, flexibility, structure, simplicity

const questions = [
  {text:"I enjoy solving highly complex problems", weights:[2,0,1,1,1,-1]},
  {text:"I prefer visual/graph-based understanding", weights:[0,2,0,0,0,0]},
  {text:"I like tools that automate work for me", weights:[0,0,2,0,0,0]},
  {text:"I enjoy customizing how things work", weights:[1,0,0,2,0,0]},
  {text:"I prefer structured systems", weights:[0,0,0,0,2,0]},
  {text:"I like simple, no-frills tools", weights:[-1,0,0,0,0,2]},
  {text:"I enjoy programming or scripting", weights:[2,0,1,2,0,-1]},
  {text:"I like step-by-step explanations", weights:[0,0,2,0,1,0]},
  {text:"I prefer speed over process", weights:[0,0,2,0,0,1]},
  {text:"I enjoy experimenting freely", weights:[1,1,0,2,0,-1]},
  {text:"I trust intuitive understanding", weights:[0,1,0,0,0,0]},
  {text:"I like hands-on/manual methods", weights:[-1,0,-2,0,0,2]},
  {text:"I prefer reliability over novelty", weights:[0,0,0,0,2,1]},
  {text:"I enjoy deep analytical work", weights:[2,0,1,0,1,0]},
  {text:"I like interactive tools", weights:[0,2,0,0,0,0]},
  {text:"I prefer minimal interfaces", weights:[0,0,0,0,0,2]},
  {text:"I enjoy learning powerful systems", weights:[2,0,1,1,1,0]},
  {text:"I want tools to give final answers quickly", weights:[0,0,2,0,0,1]},
  {text:"I enjoy logical structure", weights:[1,0,0,0,2,0]},
  {text:"I prefer traditional methods", weights:[-1,0,-1,0,1,2]}
];

const form = document.getElementById("quiz");

questions.forEach((q,i)=>{
  const div = document.createElement("div");
  div.className="question";
  div.innerHTML=`
    <p>${i+1}. ${q.text}</p>
    <input type="range" min="-3" max="3" value="0" name="q${i}">
    <div class="labels">
      <span>Strongly Disagree</span>
      <span>Neutral</span>
      <span>Strongly Agree</span>
    </div>
  `;
  form.appendChild(div);
});

// calculator profiles (aligned to traits)
const calculators = [
{code:"DES-MOS",name:"Desmos",profile:[1,3,0,1,0,0],desc:"You think visually and intuitively... You prefer clean, interactive environments where ideas can be explored freely. Your strength lies in pattern recognition and conceptual clarity."},
{code:"TI-84",name:"TI-84 Plus CE",profile:[1,0,0,0,3,1],desc:"You value reliability and structure... A dependable system is more important than experimentation. You prefer tools that are proven and consistent."},
{code:"TI-NSP",name:"TI-Nspire CX II",profile:[3,1,1,1,2,0],desc:"You seek powerful structured systems... You enjoy tackling advanced problems within a logical framework. Depth and capability matter."},
{code:"CASI-O",name:"Casio fx-991EX",profile:[1,0,1,0,2,2],desc:"You value efficiency and practicality... You prefer tools that balance functionality with simplicity. You get things done effectively."},
{code:"CASI-P",name:"Casio fx-5800P",profile:[2,0,1,2,1,0],desc:"You enjoy light customization... Enough flexibility to adapt, but without full complexity. You sit between user and builder."},
{code:"HP-12C",name:"HP 12C",profile:[1,0,0,0,2,2],desc:"You appreciate tradition and precision... Classic systems appeal to you. You value reliability and timeless design."},
{code:"HP-P",name:"HP Prime",profile:[3,2,1,2,1,0],desc:"You want power and modern design... You enjoy advanced tools that still feel intuitive. Performance and interface both matter."},
{code:"GOO-GLE",name:"Google Calculator",profile:[0,0,2,0,0,3],desc:"You prefer simplicity and speed... You just want answers quickly, without complexity or setup."},
{code:"WOLF-A",name:"WolframAlpha",profile:[3,0,3,0,1,0],desc:"You value deep computation and insight... You want powerful engines that deliver results instantly and accurately."},
{code:"GEO-GE",name:"GeoGebra",profile:[2,3,0,1,0,0],desc:"You enjoy interactive learning... Visual exploration and dynamic models help you understand deeply."},
{code:"MICR-O",name:"Microsoft Calculator",profile:[1,0,1,0,2,2],desc:"You like versatility and practicality... A tool that adapts to many situations without complexity suits you best."},
{code:"PYTH-ON",name:"Python",profile:[3,0,2,3,1,0],desc:"You value full control... You prefer building your own systems and automating workflows through code."},
{code:"PHOT-M",name:"Photomath",profile:[0,1,3,0,0,2],desc:"You want fast solutions with minimal effort... Snap, solve, move on. Efficiency dominates your style."},
{code:"CY-MATH",name:"Cymath",profile:[1,0,3,0,1,1],desc:"You want automated help but still understand steps... Guided solutions appeal to you."},
{code:"ABA-CUS",name:"Abacus",profile:[0,0,-2,0,0,3],desc:"You value tangible, manual interaction... Simplicity and physical engagement matter most."},
{code:"CHS-BOP",name:"Chisanbop",profile:[0,0,-2,1,0,3],desc:"You rely on mental/manual calculation... Fast, internal, and efficient without external tools."}
];

function calculateResult(){
  const data = new FormData(form);
  const answers = [...data.values()].map(Number);

  if(answers.length<20){
    alert("Please answer all questions.");
    return;
  }

  let traitScores=[0,0,0,0,0,0];

  answers.forEach((val,i)=>{
    questions[i].weights.forEach((w,j)=>{
      traitScores[j]+=val*w;
    });
  });

  let best=null;
  let bestScore=-Infinity;

  calculators.forEach(c=>{
    let score=0;
    c.profile.forEach((p,i)=>{
      score+=p*traitScores[i];
    });
    if(score>bestScore){
      bestScore=score;
      best=c;
    }
  });

  const resultDiv=document.getElementById("result");
  resultDiv.style.display="block";
  resultDiv.innerHTML=`
    <h2>Your THMA Type: ${best.code} (${best.name})</h2>
    <p>${best.desc}</p>
  `;
}
</script>

</body>
</html>
